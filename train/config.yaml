# AWM multi-agent RL — train the ORCHESTRATOR only (Qwen3.6-27B), sub-agent runs
# but is not trained (share_model + train_roles=["orch"] in train/awm_config.py).
#
# To co-train the sub-agent later: add a second policy `subagent` here (copy this
# block, change name/save), set share_model=false + train_roles=["orch","sub"] in
# awm_config.py. The rollout code does NOT change.
#
# GPU map below assumes 16xH200, colocate (Megatron training + sglang rollout share
# the GPUs). TP4*PP2 = 8-way model parallel; tune to your cluster.

policies:

  - name: orchestrator
    role: actor

    hf_checkpoint: /shared/models/Qwen3.6-27B            # tokenizer + arch reference
    ref_load: /shared/models/Qwen3.6-27B_torch_dist      # Megatron-format weights (already converted!)
    load: /shared/ckpt/awm/qwen3.6-27b/orchestrator      # resume-from / save-to (slime format)
    save: /shared/ckpt/awm/qwen3.6-27b/orchestrator

    buffer_mode: split

    num_gpus_per_node: 8
    megatron_num_nodes: 1          # 单节点 8 H200(colocate);够跑 27B
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 2   # TP4×PP2 = 8 路模型并行(占满 8 卡,无 DP)
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      micro_batch_size: 1
      global_batch_size: 32
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 16384

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 8       # GRPO group size (8 rollouts per task)
      eps_clip: 0.2
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 4        # 27B rollout engine across 4 H200
      mem_fraction_static: 0.75
      chunked_prefill_size: 4096
      max_running_requests: 256
      log_level: info
      server_groups:
        - worker_type: regular
          num_gpus: 4
