# L3 TRAIN config — full GRPO training step on Qwen3.6-27B (rollout + reward + weight update).
# Same policy/megatron/sglang shape as config_debug27.yaml, but this one is run WITHOUT
# --debug-rollout-only, so the megatron actor is real (builds model via mbridge from
# hf_checkpoint, computes GRPO loss, updates weights, syncs back to sglang).
#
# GPU layout (single node, 8 GPUs, NON-colocate): actor(megatron tp4×pp1=4) on 4 GPUs,
# sglang(tp4) on the other 4. This is the exact placement L2 ran (proven).

policies:

  - name: orchestrator
    role: actor

    hf_checkpoint: /tmp/instance_storage/models/Qwen3.6-27B   # local fast disk (sglang serve + mbridge source)
    ref_load: /tmp/instance_storage/models/Qwen3.6-27B        # bridge mode: load falls back here (HF weights) on first run
    load: /shared/dedicated-fsx-data-repo-training-gl-eks-us-west-2/home/jwanyang/multi-agent-world-model/save/qwen3.6-27b/model   # resume dir (absent on first run → falls back to ref_load)
    save: /shared/dedicated-fsx-data-repo-training-gl-eks-us-west-2/home/jwanyang/multi-agent-world-model/save/qwen3.6-27b/model   # weight checkpoint dir

    buffer_mode: split

    num_gpus_per_node: 8          # both nodes fully used: 2 nodes × 8 = 16 GPU (colocate)
    megatron_num_nodes: 2         # actor across 2 nodes: tp4 × dp4 = 16 GPU
    sglang_num_nodes: 2           # sglang across 2 nodes: 16 GPU / tp4 = 4 engines

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 1
      # tp4 × cp4 × pp1 = 16 = all GPUs → dp=1. TWO reasons for context-parallel (cp) here:
      #  (1) The multi-agent rollout emits ONE training sample per orchestrator turn, so the
      #      per-rollout sample count is variable (e.g. 1150) and rarely divisible by dp_size.
      #      GDN forbids sequence packing (use_dynamic_batch_size=false → static dp schedule,
      #      which requires num_mbs % (dp_size·mb_group) == 0). dp=1 removes that constraint.
      #  (2) cp splits each long sequence across 4 GPUs (a 32K trajectory → 8K/GPU), which keeps
      #      the huge-vocab (248320) logits from OOMing on a single tp4 group.
      context_parallel_size: 4
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      micro_batch_size: 1
      global_batch_size: 64         # = rollout_batch_size(8) × n_samples(8) = 64 trajectories → 1 optim step/rollout
                                    # (divisible by dp=4 → 16 micro-batches per dp rank)
      # This Qwen3.5 hybrid model has GDN (gated-delta-net / linear-attention) layers,
      # and megatron's GDN forward raises "does not support packed sequence". Dynamic
      # batching packs sequences (qkv_format=thd) → must be OFF, paired with
      # --qkv-format bshd (non-packed) + micro_batch_size, so packed_seq_params is None.
      use_dynamic_batch_size: false
      max_tokens_per_gpu: 16384

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      save_interval: 100

      # Required by the Qwen3-VL bridge whenever context_parallel_size > 1: CP splits the
      # sequence across GPUs, so the loss must be summed per-token (not averaged per-sequence
      # on each rank, which would be wrong once a sequence is split). slime's loss/cp_utils
      # implement this path fully.
      calculate_per_token_loss: true

      advantage_estimator: grpo
      n_samples_per_prompt: 8       # GRPO group size (match CLI --n-samples-per-prompt)
      eps_clip: 0.2
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 4        # tp4 on the 4 rollout GPUs
      mem_fraction_static: 0.8
      chunked_prefill_size: 4096
      max_running_requests: 256
      log_level: info
      server_groups:
        - worker_type: regular
          num_gpus: 16              # must equal sglang_num_nodes(2) × num_gpus_per_node(8) → 4 engines of tp4
          overrides:                # per-group SGLang ServerArgs overrides
            # Colocate auto-enables enable_memory_saver (torch_memory_saver). SGLang's
            # custom all-reduce registers CUDA-IPC buffers that the memory saver's
            # virtual-memory remapping invalidates → "custom_all_reduce.cuh: CUDA error:
            # invalid argument" crash during CUDA-graph capture. Fall back to NCCL
            # all-reduce, which is memory-saver-safe.
            disable_custom_all_reduce: true
