# DEBUG config — rollout+reward smoke test on Qwen3.6-35B-A3B (NO training).
# Copy of config.yaml with ONLY hf_checkpoint swapped to the 35B model.
# Used with --debug-rollout-only: the megatron/ref_load/load/save fields below are
# NOT touched (no training, no weight load) — only `hf_checkpoint` + the `sglang`
# block matter, because sglang serves the HF model for rollout.

policies:

  - name: orchestrator
    role: actor

    hf_checkpoint: /shared/models/Qwen3.6-35B-A3B        # ← the served model (tokenizer + sglang)
    ref_load: /shared/models/Qwen3.6-27B_torch_dist      # UNUSED in rollout-only (no megatron load)
    load: /shared/ckpt/awm/qwen3.6-27b/orchestrator      # UNUSED in rollout-only
    save: /shared/ckpt/awm/qwen3.6-27b/orchestrator      # UNUSED in rollout-only

    buffer_mode: split

    num_gpus_per_node: 8
    megatron_num_nodes: 1
    sglang_num_nodes: 1

    megatron:
      megatron_to_hf_mode: bridge
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 2
      context_parallel_size: 1
      expert_model_parallel_size: 1
      expert_tensor_parallel_size: 1

      recompute_granularity: full
      recompute_method: uniform
      recompute_num_layers: 1

      attention_dropout: 0.0
      hidden_dropout: 0.0
      accumulate_allreduce_grads_in_fp32: true
      attention_softmax_in_fp32: true

      micro_batch_size: 1
      global_batch_size: 32
      use_dynamic_batch_size: true
      max_tokens_per_gpu: 16384

      optimizer: adam
      lr: 1.0e-6
      lr_decay_style: constant
      weight_decay: 0.1
      adam_beta1: 0.9
      adam_beta2: 0.98
      optimizer_cpu_offload: true
      overlap_cpu_optimizer_d2h_h2d: true
      use_precision_aware_optimizer: true

      advantage_estimator: grpo
      n_samples_per_prompt: 2       # debug: small GRPO group (match CLI --n-samples-per-prompt)
      eps_clip: 0.2
      kl_coef: 0
      use_kl_loss: false
      kl_loss_coef: 0

    sglang:
      update_weights: true
      num_gpus_per_engine: 4        # 35B-A3B fits easily on 4 H200 (tp4)
      mem_fraction_static: 0.75
      chunked_prefill_size: 4096
      max_running_requests: 256
      log_level: info
      server_groups:
        - worker_type: regular
          num_gpus: 4
