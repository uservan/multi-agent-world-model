# Multi-agent eval — orchestrator + sub-agents, SAME model.
# orch: GLM-4.7-Flash   sub: GLM-4.7-Flash
mode: multi

orch_model: GLM-4.7-Flash
orch_api_key: EMPTY
orch_base_url: http://127.0.0.1:30000/v1
orch_input_cost: 1.4e-07
orch_output_cost: 1.0e-06
orch_llm_params:
  temperature: 0.6
  extra_body:
    chat_template_kwargs:
      reasoning_effort: high

sub_model: GLM-4.7-Flash
sub_api_key: EMPTY
sub_base_url: http://127.0.0.1:30000/v1
sub_input_cost: 1.4e-07
sub_output_cost: 1.0e-06
sub_llm_params:
  temperature: 0.6
  extra_body:
    chat_template_kwargs:
      reasoning_effort: high

n: 5
base_seed: 42
temperature: 0.6
max_completion_tokens: 16384
min_completion_tokens: 65536
max_turns: 100
sub_max_turns: 100
max_concurrent: 4
max_queue: 16

# Data sources
task_final: outputs/generated_new/verified/task_final.jsonl
platforms_input: outputs/platforms.jsonl
envs_input: outputs/generated_new/envs_fixed.jsonl
databases_dir: outputs/generated_new/databases
eval_root: outputs/eval/generated_new_newprompt
