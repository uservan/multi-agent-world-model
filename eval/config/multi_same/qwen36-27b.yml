# Multi-agent eval — orchestrator + sub-agents, SAME model.
# orch: Qwen3.6-27B   sub: Qwen3.6-27B
mode: multi

orch_model: Qwen3.6-27B
orch_api_key: EMPTY
orch_base_url: http://127.0.0.1:30000/v1
orch_input_cost: 1.5e-07
orch_output_cost: 6.0e-07
orch_llm_params:
  temperature: 0.6

sub_model: Qwen3.6-27B
sub_api_key: EMPTY
sub_base_url: http://127.0.0.1:30000/v1
sub_input_cost: 1.5e-07
sub_output_cost: 6.0e-07
sub_llm_params:
  temperature: 0.6

n: 5
base_seed: 42
temperature: 0.6
max_completion_tokens: 16384
min_completion_tokens: 65536
max_turns: 200   # episode ends ONLY on <done> or this cap
sub_max_turns: 200   # episode ends ONLY on <done> or this cap
max_concurrent: 4
max_queue: 16

# Data sources
task_final: outputs/generated_new/verified/task_final.jsonl
platforms_input: outputs/platforms.jsonl
envs_input: outputs/generated_new/envs_fixed.jsonl
databases_dir: outputs/generated_new/databases
eval_root: outputs/eval/generated_new_200
