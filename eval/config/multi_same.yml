# Multi-agent eval — orchestrator + sub-agents, SAME model for both.
# Run:  python eval_main.py --init eval/config/multi_same.yml

mode: multi

# Orchestrator model
orch_model: gpt-4o
orch_api_key: null
orch_base_url: null
orch_input_cost: null       # cost per input token  (editable any time; null = skip cost)
orch_output_cost: null      # cost per output token

# Sub-agent model — same as orchestrator here
sub_model: gpt-4o
sub_api_key: null
sub_base_url: null
sub_input_cost: null
sub_output_cost: null

# Repetition / sampling
n: 3
base_seed: 0
temperature: 1.0
max_completion_tokens: 16384
max_turns: 100

# Multi-agent concurrency
max_concurrent: 4           # sub-agents running at once
max_queue: 16               # total sub-agents allowed

# Data sources
task_final: outputs/generated/verified/task_final.jsonl
platforms_input: outputs/platforms.jsonl
envs_input: outputs/generated/envs.jsonl
databases_dir: outputs/generated/databases
eval_root: outputs/eval
