# Multi-agent eval — orchestrator + sub-agents, DIFFERENT models (strong orchestrator + cheap sub-agents).
# orch: Qwen3.5-122B-A10B   sub: Qwen3.5-35B-A3B
# NOTE: orch and sub are different models -> run TWO sglang servers:
#   orchestrator on :30000, sub-agent on :30001
mode: multi

orch_model: Qwen3.5-122B-A10B
orch_api_key: EMPTY
orch_base_url: http://127.0.0.1:30000/v1
orch_input_cost: 2.6e-07
orch_output_cost: 2.08e-06
orch_llm_params:
  temperature: 0.6

sub_model: Qwen3.5-35B-A3B
sub_api_key: EMPTY
sub_base_url: http://127.0.0.1:30001/v1
sub_input_cost: 1.4e-07
sub_output_cost: 1.0e-06
sub_llm_params:
  temperature: 0.6

n: 5
base_seed: 42
temperature: 0.6
max_completion_tokens: 16384
min_completion_tokens: 65536
max_turns: 100
sub_max_turns: 100
max_concurrent: 4
max_queue: 16

# Data sources
data_root: outputs/generated_new   # derives task_final / platforms / envs / databases / servers
eval_root: outputs/eval/generated_new_newprompt
