# Single-agent eval — one model does everything.
# Run:  python eval_main.py --init eval/config/single.yml

mode: single

# The agent model — local sglang serving Qwen3.5-122B-A10B
orch_model: Qwen3.5-122B-A10B
orch_api_key: EMPTY              # sglang has no key; openai SDK just needs a non-empty value
orch_base_url: http://127.0.0.1:30000/v1
orch_input_cost: 0.00000026      # $0.26 / 1M tokens (OpenRouter ref)
orch_output_cost: 0.00000208     # $2.08 / 1M tokens (OpenRouter ref)

# Repetition / sampling
n: 1                        # runs per task (each a different seed)
base_seed: 42
temperature: 0.6           # HuggingFace generation_config recommended value
max_completion_tokens: 16384
max_turns: 100

# Data sources
task_final: outputs/generated/verified/task_final.jsonl
platforms_input: outputs/platforms.jsonl
envs_input: outputs/generated/envs.jsonl
databases_dir: outputs/generated/databases
eval_root: outputs/eval
