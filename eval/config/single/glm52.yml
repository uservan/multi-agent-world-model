# Single-agent eval — one model does everything.   model: GLM-5.2
mode: single

orch_model: GLM-5.2
orch_api_key: EMPTY
orch_base_url: http://127.0.0.1:30000/v1
orch_input_cost: null
orch_output_cost: null
# GLM-5.2 thinking via reasoning_effort (sglang glm45 parser splits reasoning out).
orch_llm_params:
  extra_body:
    chat_template_kwargs:
      reasoning_effort: high
  temperature: 1.0

n: 3
base_seed: 42
temperature: 1.0
max_completion_tokens: 16384
min_completion_tokens: 65536
max_turns: 200

# Data sources
data_root: outputs/test_gen_by_claude   # derives task_final / platforms / envs / databases / servers
eval_root: outputs/new_eval/glm52_single
