# Single-agent eval — one model does everything.   model: GLM-4.7-Flash
mode: single

orch_model: GLM-4.7-Flash
orch_api_key: EMPTY
orch_base_url: http://127.0.0.1:30000/v1
orch_input_cost: 1.4e-07
orch_output_cost: 1.0e-06
orch_llm_params:
  temperature: 0.6
  extra_body:
    chat_template_kwargs:
      reasoning_effort: high

n: 3
base_seed: 42
temperature: 0.6
max_completion_tokens: 16384
min_completion_tokens: 65536
max_turns: 100

# Data sources
data_root: outputs/test_gen_by_claude   # derives task_final / platforms / envs / databases / servers
eval_root: outputs/new_eval/glm47_single
