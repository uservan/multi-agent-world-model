# Single-agent eval — Claude via AWS Bedrock.
# Model ids starting with "us.anthropic." are auto-routed to bedrock-runtime (boto3):
# no api_key / base_url needed — credentials come from ~/.aws/credentials, which the
# ada refresh loop keeps fresh (the client auto-rebuilds on expired-token errors).
# Costs are $/token — update to the current pricing of the model you pick.
mode: single

orch_model: us.anthropic.claude-sonnet-5      # or us.anthropic.claude-opus-4-8
orch_api_key: null
orch_base_url: null
orch_input_cost: 3.0e-06      # $3 / 1M input tokens — check current pricing
orch_output_cost: 1.5e-05     # $15 / 1M output tokens
orch_llm_params:
  temperature: 1.0

n: 5
base_seed: 42
temperature: 1.0
max_completion_tokens: 16384
min_completion_tokens: 65536
max_turns: 200

# Data sources — one root, everything derived (verified/task_final.jsonl,
# platforms.jsonl, envs.jsonl, databases/, servers/).
data_root: outputs/test_gen_by_claude
eval_root: outputs/new_eval/eval_gen_claude
